<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartPay Live Counter</title>
  <style>
    :root {
      --bg-a: #0f172a;
      --bg-b: #1e293b;
      --card: rgba(255, 255, 255, 0.08);
      --text: #f8fafc;
      --accent: #22d3ee;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, var(--bg-b), var(--bg-a));
      color: var(--text);
      font-family: "Segoe UI", Tahoma, sans-serif;
    }

    .panel {
      width: min(92vw, 560px);
      padding: 28px;
      border-radius: 18px;
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.14);
      backdrop-filter: blur(8px);
      text-align: center;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(1.35rem, 3.8vw, 2rem);
      font-weight: 700;
    }

    .count {
      margin: 8px 0 12px;
      font-size: clamp(3rem, 12vw, 5rem);
      line-height: 1;
      font-weight: 800;
      color: var(--accent);
      text-shadow: 0 0 24px rgba(34, 211, 238, 0.35);
    }

    .meta {
      font-size: 0.95rem;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>SmartPay Customer Entries</h1>
    <div id="count" class="count">0</div>
    <div id="status" class="meta">Connecting...</div>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const countEl = document.getElementById("count");
    const statusEl = document.getElementById("status");

    const socket = io();

    socket.on("connect", () => {
      statusEl.textContent = "Connected. Waiting for Arduino events...";
    });

    socket.on("disconnect", () => {
      statusEl.textContent = "Disconnected from server.";
    });

    socket.on("counter_update", (payload) => {
      if (!payload || typeof payload.count !== "number") {
        return;
      }
      countEl.textContent = String(payload.count);
    });
  </script>
</body>
</html>
