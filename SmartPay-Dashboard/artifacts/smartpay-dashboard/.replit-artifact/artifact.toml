kind = "web"
previewPath = "/"
title = "SmartPay Dashboard"
version = "1.0.0"
id = "artifacts/smartpay-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22991

[services.development]
run = "pnpm --filter @workspace/smartpay-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/smartpay-dashboard", "run", "build" ]
publicDir = "artifacts/smartpay-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22991"
BASE_PATH = "/"
